<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Budget Buddy AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-container">
    {% for category, message in messages %}
    <div class="flash flash-{{ category }}" onclick="this.remove()">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>💰 Budget Buddy AI</h1>
      <p>Your smart financial companion</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <div class="form-group" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" name="remember" id="remember"
               style="accent-color:var(--mint);width:16px;height:16px;"/>
        <label for="remember" style="font-size:0.85rem;color:var(--text-secondary);cursor:pointer;">
          Remember me
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
    </div>
  </div>
</div>

</body>
</html>
