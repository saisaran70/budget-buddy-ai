<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0B1120"/>
  <title>Sign In — Budget Buddy AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-container">
    {% for category, message in messages %}
    <div class="flash flash-{{ category }}" onclick="this.remove()">
      <span>{{ message }}</span><span class="flash-close">✕</span>
    </div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💰</div>
      <h1>Budget Buddy AI</h1>
      <p>Your smart financial companion</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required autocomplete="email" autofocus/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="loginPwd" class="form-control"
                 placeholder="••••••••" required autocomplete="current-password"
                 style="padding-right:44px;"/>
          <button type="button" onclick="togglePwd('loginPwd',this)"
                  style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:0.85rem;padding:4px;">
            👁
          </button>
        </div>
      </div>

      <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <input type="checkbox" name="remember" id="remember"
               style="accent-color:var(--mint);width:15px;height:15px;cursor:pointer;"/>
        <label for="remember" style="font-size:0.82rem;color:var(--text-secondary);cursor:pointer;">
          Remember me for 30 days
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one free</a>
    </div>
  </div>
</div>

<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}
document.querySelectorAll('.flash').forEach(el => setTimeout(() => el.remove(), 4000));
</script>
</body>
</html>
