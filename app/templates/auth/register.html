<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0B1120"/>
  <title>Create Account — Budget Buddy AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-container">
    {% for category, message in messages %}
    <div class="flash flash-{{ category }}" onclick="this.remove()">
      <span>{{ message }}</span><span class="flash-close">✕</span>
    </div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💰</div>
      <h1>Create account</h1>
      <p>Start your financial journey today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" name="full_name" class="form-control"
               placeholder="Your name" required autocomplete="name" autofocus/>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="regPwd" class="form-control"
                 placeholder="At least 6 characters" required autocomplete="new-password"
                 style="padding-right:44px;"/>
          <button type="button" onclick="togglePwd('regPwd',this)"
                  style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:0.85rem;padding:4px;">
            👁
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repeat password" required autocomplete="new-password"/>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>

<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}
document.querySelectorAll('.flash').forEach(el => setTimeout(() => el.remove(), 4000));
</script>
</body>
</html>
